{% extends "base.html" %}
{% block title %}重置数据库{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="color: #e74c3c;">⚠️ 重置数据库</h2>
    <p style="color: #5a6c7d; margin-bottom: 1.5rem;">
        此操作将清空所有故事数据，且不可恢复！请务必先备份数据库文件（game.db）。
    </p>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="success">{{ success }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="form-group" style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #5a6c7d;">
                请输入管理员密码确认操作
            </label>
            <input type="password" name="password" required class="form-control">
        </div>
        
        <button type="submit" class="btn-blue" style="width: 100%; padding: 0.8rem; background: #e74c3c; box-shadow: 0 2px 8px rgba(231, 76, 60, 0.3);">
            🗑️ 确认重置数据库
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="/admin" class="btn-gray">取消并返回</a>
    </div>
</div>
{% endblock %}
