{% extends "base.html" %}
{% block title %}新建故事{% endblock %}

{% block content %}
<div class="card" style="max-width:600px; margin:0 auto;">
    <h2>新建故事</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="form-group" style="margin-bottom:1rem;">
            <label>故事名称</label>
            <input type="text" name="story_name" required class="form-control" placeholder="比如：豪宅毒杀案">
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label>故事简介</label>
            <textarea name="story_desc" rows="4" class="form-control" placeholder="一句话概括故事核心悬念..."></textarea>
        </div>
        <button type="submit" class="btn-blue" style="width:100%; padding:0.8rem;">🚀 创建并开始创作</button>
    </form>
    <div style="text-align:center; margin-top:1.5rem;">
        <a href="/admin" class="btn-gray">返回列表</a>
    </div>
</div>
{% endblock %}
