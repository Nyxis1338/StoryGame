{% extends "base.html" %}
{% block title %}修改密码{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>修改管理员密码</h2>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="success">{{ success }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="form-group" style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #5a6c7d;">当前密码</label>
            <input type="password" name="current_password" required class="form-control">
        </div>
        
        <div class="form-group" style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #5a6c7d;">新密码</label>
            <input type="password" name="new_password" required class="form-control">
        </div>
        
        <div class="form-group" style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #5a6c7d;">确认新密码</label>
            <input type="password" name="confirm_password" required class="form-control">
        </div>
        
        <button type="submit" class="btn-blue" style="width: 100%; padding: 0.8rem;">
            🔑 修改密码
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="/admin" class="btn-gray">返回管理首页</a>
    </div>
</div>
{% endblock %}
