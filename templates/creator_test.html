<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>分栏测试</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background:#f0f2f5; height:100vh; }
        .app { display:flex; flex-direction:column; height:100vh; }
        .navbar { 
            padding:12px 24px; 
            background:white; 
            border-bottom:1px solid #e0e0e0;
            flex-shrink:0;
        }
        .navbar h2 { font-size:18px; color:#1a1a2e; }
        .navbar .hint { font-size:13px; color:#888; font-weight:normal; }
        .main { 
            display:flex; 
            flex:1; 
            overflow:hidden; 
            padding:12px; 
            gap:0; 
        }
        .left { 
            height:100%; 
            background:#fff; 
            border-radius:16px; 
            box-shadow:0 2px 8px rgba(0,0,0,0.06); 
            flex-shrink:0; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            font-size:18px; 
            color:#555;
            transition: background 0.3s;
            overflow:hidden;
        }
        .left .content {
            text-align:center;
        }
        .left .content .big { font-size:36px; display:block; margin-bottom:8px; }
        .left .content .pct { font-weight:bold; color:#1a73e8; }
        .splitter { 
            flex:0 0 6px; 
            background:#e0e0e0; 
            cursor:col-resize; 
            border-radius:3px; 
            margin:0 4px;
            transition: background 0.2s;
            position:relative;
        }
        .splitter:hover { background:#1a73e8; }
        .splitter.active { background:#1a73e8; }
        .splitter::after {
            content: '⋮';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #999;
            font-size: 14px;
            font-weight: bold;
        }
        .splitter:hover::after { color: white; }
        .right { 
            flex:1; 
            background:#fff; 
            border-radius:16px; 
            box-shadow:0 2px 8px rgba(0,0,0,0.06); 
            padding:24px 28px; 
            overflow-y:auto; 
        }
        .right h3 { font-size:18px; color:#1a1a2e; margin-bottom:12px; }
        .right p { color:#666; line-height:1.8; margin-bottom:8px; }
        .right .status {
            display:inline-block;
            padding:4px 16px;
            border-radius:20px;
            font-size:13px;
            font-weight:bold;
        }
        .status.good { background:#d4edda; color:#155724; }
        .status.bad { background:#f8d7da; color:#721c24; }
        .log-area {
            margin-top:16px;
            padding:12px;
            background:#f8f9fa;
            border-radius:8px;
            font-size:13px;
            color:#555;
            max-height:200px;
            overflow-y:auto;
            font-family: monospace;
        }
        .log-area .log-entry { padding:2px 0; border-bottom:1px solid #eee; }
        .log-area .log-entry .time { color:#999; margin-right:8px; }
        .log-area .log-entry .highlight { color:#1a73e8; font-weight:bold; }
    </style>
</head>
<body>
{% raw %}
<div id="app" class="app">
    <div class="navbar">
        <h2>
            🧪 分栏拖拽测试（无 ECharts）
            <span class="hint">— 拖拽中间分隔条测试拉伸效果</span>
        </h2>
    </div>
    <div class="main" ref="mainContainer">
        <div class="left" :style="{ width: leftWidth + '%' }" :class="{ dragging: isDragging }">
            <div class="content">
                <span class="big">📐</span>
                <span>左侧面板</span>
                <span class="pct">{{ leftPercent }}%</span>
            </div>
        </div>
        <div class="splitter" :class="{ active: isDragging }" @mousedown="startDrag">
        </div>
        <div class="right">
            <h3>右侧面板 <span class="status good">✅ 流畅</span></h3>
            <p>当前右侧宽度：<strong>{{ rightPercent }}%</strong></p>
            <p>拖拽中间分隔条测试拉伸效果</p>
            <p>如果这里流畅，说明问题在 ECharts</p>
            <p>如果卡顿，说明问题在事件监听或布局</p>
            <hr style="margin:16px 0; border-color:#eee;">
            <p><strong>📊 状态信息：</strong></p>
            <p>• 拖拽中：<span v-if="isDragging" style="color:#1a73e8;">✅ 是</span><span v-else style="color:#999;">否</span></p>
            <p>• 左侧宽度：<strong>{{ leftPercent }}%</strong></p>
            <p>• 右侧宽度：<strong>{{ rightPercent }}%</strong></p>
            <div class="log-area">
                <div v-for="(log, idx) in logs" :key="idx" class="log-entry">
                    <span class="time">{{ log.time }}</span>
                    <span>{{ log.msg }}</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endraw %}

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
<script>
const { createApp } = Vue;
createApp({
    data() {
        return {
            leftWidth: parseFloat(localStorage.getItem('testLeftWidth')) || 70,
            isDragging: false,
            dragStartX: 0,
            startLeftWidth: 70,
            logs: [],
            logCount: 0
        };
    },
    computed: {
        leftPercent() {
            return Math.round(this.leftWidth);
        },
        rightPercent() {
            return Math.round(100 - this.leftWidth);
        }
    },
    methods: {
        addLog(msg) {
            this.logCount++;
            const time = new Date().toLocaleTimeString();
            this.logs.unshift({ time, msg });
            if (this.logs.length > 50) this.logs.pop();
        },
        startDrag(e) {
            this.isDragging = true;
            this.dragStartX = e.clientX;
            this.startLeftWidth = this.leftWidth;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            this.addLog('🟢 开始拖拽');
        },
        onDrag(e) {
            if (!this.isDragging) return;
            const container = this.$refs.mainContainer;
            if (!container) return;
            const rect = container.getBoundingClientRect();
            const totalWidth = rect.width;
            if (totalWidth === 0) return;
            
            const delta = (e.clientX - this.dragStartX) / totalWidth * 100;
            let newWidth = Math.max(15, Math.min(85, this.startLeftWidth + delta));
            this.leftWidth = newWidth;
        },
        stopDrag() {
            if (!this.isDragging) return;
            this.isDragging = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            localStorage.setItem('testLeftWidth', this.leftWidth);
            this.addLog(`🔴 停止拖拽 → 左侧 ${this.leftPercent}%`);
        }
    },
    mounted() {
        document.addEventListener('mousemove', this.onDrag);
        document.addEventListener('mouseup', this.stopDrag);
        document.addEventListener('mouseleave', this.stopDrag);
        this.addLog('✅ 测试页面已加载');
        this.addLog(`📐 初始宽度: ${this.leftPercent}%`);
    },
    beforeUnmount() {
        document.removeEventListener('mousemove', this.onDrag);
        document.removeEventListener('mouseup', this.stopDrag);
        document.removeEventListener('mouseleave', this.stopDrag);
    }
}).mount('#app');
</script>
</body>
</html>
