<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryGame - 侦探文字推理游戏</title>
    <!-- 轻量Tailwind CDN，无需本地安装编译 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 侦探主题自定义配色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0f172a',
                        cardbg: '#1e293b',
                        accent: '#8b5cf6',
                        warn: '#ef4444',
                        success: '#10b981'
                    },
                    fontFamily: {
                        serif: ['SimSun', 'serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            }
            .story-text {
                white-space: pre-wrap;
                line-height: 2;
            }
        }
    </style>
</head>
<body class="bg-darkbg text-gray-200 min-h-screen font-serif">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="mb-8 text-center">
            <h1 class="text-[clamp(1.8rem,4vw,2.8rem)] font-bold text-accent text-shadow">
                侦探推理文字游戏
            </h1>
            <a href="/" class="text-gray-400 hover:text-accent mt-2 inline-block">返回故事列表</a>
        </header>

        <!-- 全局提示弹窗 -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="bg-warn/20 border border-warn text-warn p-3 rounded mb-4 text-center">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <main class="bg-cardbg rounded-xl shadow-2xl p-6 md:p-10">
            {% block content %}{% endblock %}
        </main>
        {% block footer_extra %}{% endblock %}
    </div>
</body>
</html>
