{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl mb-6 text-center text-warn">数据库重置权限验证</h2>
<p class="text-gray-400 text-center mb-8">重置会清空所有剧本数据，仅管理员操作</p>

<form action="/init" method="POST" class="max-w-sm mx-auto">
    <label class="block mb-2 text-gray-300">输入管理员密码</label>
    <input type="password" name="pwd" required
           class="w-full bg-darkbg border border-gray-600 rounded-lg px-4 py-3 mb-6 focus:border-accent outline-none">
    <button type="submit" class="w-full bg-warn hover:bg-warn/80 py-3 rounded-lg font-bold">
        确认重置数据库
    </button>
</form>
{% endblock %}
