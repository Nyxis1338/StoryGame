{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl mb-6 text-center text-warn">修改管理员后台密码</h2>
<p class="text-gray-400 text-center mb-8">重置库、上传剧本都需要此密码，请妥善保管</p>

<form action="/admin/password_edit" method="POST" class="max-w-sm mx-auto">
    <label class="block mb-2 text-gray-300">当前管理员密码</label>
    <input type="password" name="old_pwd" required
           class="w-full bg-darkbg border border-gray-600 rounded-lg px-4 py-3 mb-5 focus:border-accent outline-none">

    <label class="block mb-2 text-gray-300">设置新密码</label>
    <input type="password" name="new_pwd" required
           class="w-full bg-darkbg border border-gray-600 rounded-lg px-4 py-3 mb-5 focus:border-accent outline-none">

    <label class="block mb-2 text-gray-300">再次输入新密码</label>
    <input type="password" name="confirm_pwd" required
           class="w-full bg-darkbg border border-gray-600 rounded-lg px-4 py-3 mb-8 focus:border-accent outline-none">

    <button type="submit" class="w-full bg-accent hover:bg-accent/80 py-3 rounded-lg font-bold">
        确认修改密码
    </button>
</form>
{% endblock %}
