{% extends "base.html" %}
{% block content %}
<div class="story-text text-gray-100 text-lg mb-10">
    {{ page.content }}
</div>

<h3 class="text-xl mb-4 border-l-4 border-accent pl-3">请做出你的选择</h3>

<form action="/choose" method="POST">
    <input type="hidden" name="story_id" value="{{ story_id }}">
    <div class="flex flex-col gap-3">
        {% for opt in page.options %}
        <button type="submit"
                name="jump_local_id"
                value="{{ opt.jump_local_id }}"
                class="py-4 px-4 border border-gray-600 rounded-lg hover:border-accent hover:bg-accent/10 transition-all text-left text-base">
            {{ opt.text }}
        </button>
        {% endfor %}
    </div>
</form>
{% endblock %}
