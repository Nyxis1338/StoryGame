<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>故事编辑器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/creator.css') }}">

</head>
<body class="creator-body">
    <div id="app" data-story-id="{{ story_id }}"></div>

    <!-- ===== 1. 先加载 Vue 核心库 ===== -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>

    <!-- ===== 2. 加载 jsPlumb 核心库 ===== -->
    <script src="https://cdn.jsdelivr.net/npm/jsplumb@2.15.6/dist/js/jsplumb.min.js"></script>

    <!-- ===== 3. 加载自定义 API 和渲染器（顺序无关紧要，但需在 Vue 之后） ===== -->
    <script src="{{ url_for('static', filename='js/story_api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jsplumb_renderer.js') }}"></script>

    <!-- ===== 4. 最后加载编辑器组件 ===== -->
    <script src="{{ url_for('static', filename='js/creator.js') }}"></script>
</body>
</html>
