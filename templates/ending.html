{% extends "base.html" %}
{% block content %}
{% if page.is_true_ending == 1 %}
    <div class="bg-success/20 border border-success rounded-lg p-4 text-center text-success text-xl mb-6">
        🎉 推理完全正确 · 真结局
    </div>
{% else %}
    <div class="bg-warn/20 border border-warn rounded-lg p-4 text-center text-warn text-xl mb-6">
        ❌ 推理出现失误 · 错误结局
    </div>
{% endif %}

<div class="story-text text-gray-100 text-lg mb-10">
    {{ page.content }}
</div>

<a href="/" class="block w-full py-4 text-center bg-accent hover:bg-accent/80 rounded-lg font-bold text-lg">
    返回故事列表，重新挑战
</a>
{% endblock %}
