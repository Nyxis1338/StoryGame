<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}侦探手记 | 沉浸式推理{% endblock %}</title>
    <!-- ✅ 关键：引入CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/novel.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="detective-layout">
    <!-- 移动端汉堡菜单 -->
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>

    <!-- 左侧：故事列表区（全局固定） -->
    <aside class="story-sidebar" id="storySidebar">
        <div class="sidebar-header">
            <h1 class="logo">🕵️ 侦探手记</h1>
            <p class="subtitle">迷雾中的真相，等你揭开</p>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="storySearch" placeholder="搜索故事名...">
            <span class="search-icon" id="searchIcon">🔍</span>
        </div>

        <!-- 故事列表 -->
        <div class="story-list" id="storyList">
            {% if stories %}
                {% for story in stories %}
                <div class="story-card" data-story-id="{{ story[0] }}">
                    <h3 class="story-title">{{ story[1] }}</h3>
                    <p class="story-desc">{{ story[2] }}</p>
                    <button class="start-read-btn" data-story-id="{{ story[0] }}">
                        ▶ 开始阅读
                    </button>
                </div>
                {% endfor %}
            {% else %}
                <p style="color: var(--text-muted); text-align: center; margin-top: 2rem;">
                    暂无故事，请到后台添加
                </p>
            {% endif %}
        </div>

        <!-- 底部管理入口 -->
        <div class="sidebar-footer">
            <a href="http://127.0.0.1:5001/admin" target="_blank" class="admin-link">
                🔧 后台管理
            </a>
            <p class="copyright">© 2026 侦探故事引擎</p>
        </div>
    </aside>

    <!-- 右侧：内容区（核心！所有页面的内容都插在这里） -->
    <main class="reading-area" id="readingArea">
        {% block content %}
            <!-- 默认空内容，由子模板（index.html/page.html）填充 -->
        {% endblock %}

        <!-- 加载动画（所有页面共享） -->
        <div class="loading-spinner" id="loadingSpinner" style="display: none;">
            <div class="spinner-icon">🔍</div>
            <p>正在翻阅卷宗...</p>
        </div>
    </main>

    <!-- ✅ 关键：全局JS占位符 -->
    {% block scripts %}{% endblock %}
</body>
</html>
